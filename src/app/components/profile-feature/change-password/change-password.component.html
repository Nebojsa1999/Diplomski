<div class="flex flex-col justify-center h-full bg-no-repeat bg-cover bg-center">
    <div class="w-full flex items-center justify-center flex-grow">
        <mat-card class="w-137">
            <mat-card-content>
                <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">
                    <div class="flex flex-row justify-between items-center">
                        <h2>{{ 'COMMON.CHANGE_PASSWORD' | translate }}</h2>
                        <button mat-icon-button type="button" (click)="goBack()"><mat-icon>arrow_back</mat-icon></button>
                    </div>
                    <mat-form-field>
                        <input matInput type="password" formControlName="password">
                        @if (form.get('password')?.hasError('required')) {
                            <mat-error>
                                {{ 'COMMON.ERROR_PASSWORD_INVALID' | translate }}
                            </mat-error>
                        }
                    </mat-form-field>
                    <button mat-raised-button color="primary">{{ 'COMMON.SUBMIT' | translate }}</button>
                </form>
            </mat-card-content>
        </mat-card>
    </div>
</div>
