@if (rooms(); as rooms) {
    <div class="cp-content flex flex-col flex-1 justify-between gap-6 mt-8">
        <div class="overflow-hidden flex flex-col gap-4 flex-1">
            <div class="flex flex-row m-2 justify-between items-center">
                <h2 style="font-weight: bold">{{ 'COMMON.ROOMS' | translate }}</h2>
                <div class="flex flex-row gap-x-2">
                    <button mat-stroked-button (click)="goBack()">{{ 'COMMON.BACK' | translate }}</button>
                    <button mat-raised-button (click)="addRoom()">
                        <mat-icon>add</mat-icon>
                        {{ 'COMMON.ADD_ROOM' | translate }}
                    </button>
                </div>
            </div>
            <mat-card class="flow-row ">
                <div class="flex-column items-start m-4">
                    <app-filter-rooms (searchClicked)="searchClicked($event)"></app-filter-rooms>
                </div>
            </mat-card>
            <mat-card class="mobile-table-scroll">
                <table mat-table [dataSource]="rooms">
                    <ng-container matColumnDef="RoomNumber">
                        <th mat-header-cell *matHeaderCellDef> {{ 'COMMON.ROOM_NUMBER' | translate }}</th>
                        <td mat-cell *matCellDef="let room"> {{ room.roomNumber }}</td>
                    </ng-container>
                    <ng-container matColumnDef="Type">
                        <th mat-header-cell *matHeaderCellDef> {{ 'COMMON.ROOM_TYPE' | translate }}</th>
                        <td mat-cell *matCellDef="let room">{{ ('COMMON.' + room.type) |  translate }}</td>
                    </ng-container>
                    <ng-container matColumnDef="Capacity">
                        <th mat-header-cell *matHeaderCellDef> {{ 'COMMON.CAPACITY' | translate }}</th>
                        <td mat-cell *matCellDef="let room">{{ room.capacity }}</td>
                    </ng-container>
                    <ng-container matColumnDef="Update">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let room">
                            <button [routerLink]="['/edit-room/' + room.id]" mat-icon-button>
                                <mat-icon svgIcon="edit">
                                </mat-icon>
                            </button>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Actions">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let room">
                            <button mat-icon-button (click)="goToRooms(room.id)">
                                <mat-icon svgIcon="room">
                                </mat-icon>
                            </button>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="Delete">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let room">
                            <button mat-icon-button class="btn-error" (click)="deleteRoom(room.id)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </mat-card>
        </div>
    </div>
}
